<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="ring" x1="0.2" y1="0.1" x2="0.8" y2="0.9"><stop offset="0%" stop-color="#FFF5C8"/><stop offset="55%" stop-color="#FFD060"/><stop offset="100%" stop-color="#C48A1A"/></linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.75"><stop offset="0%" stop-color="#FFFBE8"/><stop offset="55%" stop-color="#FFEDA8"/><stop offset="100%" stop-color="#F5C040" stop-opacity="0.5"/></radialGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFD060"/><stop offset="100%" stop-color="#A87000"/></linearGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFEDA8"/><stop offset="50%" stop-color="#FFD060"/><stop offset="100%" stop-color="#B07800"/></linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFD060"/><stop offset="100%" stop-color="#7A5000"/></linearGradient>
  </defs>
  <ellipse cx="48" cy="92" rx="26" ry="2.5" fill="#7A5000" opacity="0.2"/>
  <g><path d="M 28 70 L 28 93 L 38 87 L 48 92 L 58 87 L 68 93 L 68 70 Z" fill="url(#ribbon)" stroke="#7A5000" stroke-width="0.8" stroke-linejoin="round"/>
    <path d="M 28 70 L 38 87 L 28 84 Z" fill="#7A5000" opacity="0.35"/><path d="M 68 70 L 58 87 L 68 84 Z" fill="#7A5000" opacity="0.35"/></g>
  <circle cx="48" cy="48" r="42" fill="url(#bg)" stroke="url(#ring)" stroke-width="5"/>
  <circle cx="48" cy="48" r="38" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.65"/>
  <g opacity="0.45" stroke="#FFD060" stroke-width="1" stroke-linecap="round">
    <line x1="48" y1="14" x2="48" y2="20"/><line x1="14" y1="48" x2="20" y2="48"/><line x1="76" y1="48" x2="82" y2="48"/>
    <line x1="22" y1="22" x2="26" y2="26"/><line x1="74" y1="22" x2="70" y2="26"/>
    <animate attributeName="opacity" values="0.45;0.7;0.45" dur="4.80s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </g>
  <path d="M 26 36 Q 48 22 70 36" fill="none" stroke="#fff" stroke-width="2.2" opacity="0.7" stroke-linecap="round"/>
  <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -1.2;0 0" dur="6.75s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <path d="M 18 50 C 17 48 15 48 15 50 C 15 52 18 54 18 54 C 18 54 21 52 21 50 C 21 48 19 48 18 50 Z" fill="#F5B5C5" opacity="0.85"><animate attributeName="opacity" values="0.85;0.6;0.85" dur="4.50s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></path>
    <path d="M 78 50 C 77 48 75 48 75 50 C 75 52 78 54 78 54 C 78 54 81 52 81 50 C 81 48 79 48 78 50 Z" fill="#F5B5C5" opacity="0.7"><animate attributeName="opacity" values="0.7;0.4;0.7" dur="5.40s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></path>
  </g>
  <!-- crown (gentle bob) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -1;0 0" dur="6.00s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <!-- crown silhouette: 5 points (M-W shape) -->
    <path d="M 24 64
             L 24 38
             L 32 50
             L 38 30
             L 48 48
             L 58 30
             L 64 50
             L 72 38
             L 72 64 Z"
          fill="url(#crown)" stroke="#7A5000" stroke-width="1.6" stroke-linejoin="round"/>
    <!-- crown highlight curves -->
    <path d="M 28 42 Q 30 50 30 60" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.6" stroke-linecap="round"/>
    <path d="M 44 38 Q 46 44 46 50" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
    <!-- 5 peak gem balls -->
    <g>
      <circle cx="24" cy="38" r="2.6" fill="#A8E0F5" stroke="#3D7A8A" stroke-width="0.8"/>
      <circle cx="23.4" cy="37.4" r="0.7" fill="#fff"/>
    </g>
    <g>
      <circle cx="38" cy="30" r="3" fill="#FFE066" stroke="#a47e0c" stroke-width="0.8">
        <animate attributeName="r" values="3;3.2;3" dur="3.60s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </circle>
      <circle cx="37.2" cy="29.2" r="0.8" fill="#fff"/>
    </g>
    <g>
      <circle cx="58" cy="30" r="3" fill="#FFE066" stroke="#a47e0c" stroke-width="0.8">
        <animate attributeName="r" values="3;3.2;3" dur="3.60s" repeatCount="indefinite" begin="0.6s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </circle>
      <circle cx="57.2" cy="29.2" r="0.8" fill="#fff"/>
    </g>
    <g>
      <circle cx="72" cy="38" r="2.6" fill="#A8E0F5" stroke="#3D7A8A" stroke-width="0.8"/>
      <circle cx="71.4" cy="37.4" r="0.7" fill="#fff"/>
    </g>
    <!-- crown band -->
    <rect x="24" y="60" width="48" height="10" rx="1.5" fill="url(#band)" stroke="#7A5000" stroke-width="1.6"/>
    <rect x="26" y="61.5" width="44" height="1.5" fill="#fff" opacity="0.55"/>
    <!-- big center heart gem (heartbeat) -->
    <g>
      <animateTransform attributeName="transform" type="scale" values="1 1; 1.05 1.05; 1 1" dur="2.40s" repeatCount="indefinite" additive="sum" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      <path d="M 48 40
               C 44 35 38 36 39 44
               C 40 51 48 56 48 56
               C 48 56 56 51 57 44
               C 58 36 52 35 48 40 Z"
            fill="#FF6B8A" stroke="#A86075" stroke-width="1.3"/>
      <ellipse cx="44.5" cy="44" rx="1.6" ry="2.6" fill="#fff" opacity="0.65" transform="rotate(-25 44.5 44)"/>
    </g>
    <!-- band gems (3 row) -->
    <circle cx="34" cy="65" r="1.6" fill="#A8E0F5" stroke="#3D7A8A" stroke-width="0.5"/>
    <circle cx="48" cy="65" r="1.8" fill="#FF8FA8" stroke="#A86075" stroke-width="0.5"/>
    <circle cx="62" cy="65" r="1.6" fill="#A8E0F5" stroke="#3D7A8A" stroke-width="0.5"/>
    <circle cx="33.5" cy="64.5" r="0.5" fill="#fff"/>
    <circle cx="47.5" cy="64.5" r="0.5" fill="#fff"/>
    <circle cx="61.5" cy="64.5" r="0.5" fill="#fff"/>
  </g>
  <path d="M 22 40 L 23 38 L 24 40 L 26 41 L 24 42 L 23 44 L 22 42 L 20 41 Z" fill="#fff" opacity="0.9"><animate attributeName="opacity" values="0.9;0.6;0.9" dur="3.60s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></path>
  <path d="M 72 40 L 73 38 L 74 40 L 76 41 L 74 42 L 73 44 L 72 42 L 70 41 Z" fill="#fff" opacity="0.85"><animate attributeName="opacity" values="0.85;0.55;0.85" dur="4.20s" repeatCount="indefinite" begin="0.8s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></path>
</svg>
