<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="ring" x1="0.2" y1="0.1" x2="0.8" y2="0.9"><stop offset="0%" stop-color="#FFF5C8"/><stop offset="55%" stop-color="#FFD060"/><stop offset="100%" stop-color="#C48A1A"/></linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.75"><stop offset="0%" stop-color="#FFFBE8"/><stop offset="55%" stop-color="#FFEDA8"/><stop offset="100%" stop-color="#F5C040" stop-opacity="0.5"/></radialGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFD060"/><stop offset="100%" stop-color="#A87000"/></linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.4" r="0.6"><stop offset="0%" stop-color="#FFFBE0"/><stop offset="55%" stop-color="#FFE066"/><stop offset="100%" stop-color="#F5B400"/></radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFE066"/><stop offset="100%" stop-color="#F5B400"/></linearGradient>
  </defs>
  <ellipse cx="48" cy="92" rx="26" ry="2.5" fill="#7A5000" opacity="0.2"/>
  <g><path d="M 28 70 L 28 93 L 38 87 L 48 92 L 58 87 L 68 93 L 68 70 Z" fill="url(#ribbon)" stroke="#7A5000" stroke-width="0.8" stroke-linejoin="round"/>
    <path d="M 28 70 L 38 87 L 28 84 Z" fill="#7A5000" opacity="0.35"/><path d="M 68 70 L 58 87 L 68 84 Z" fill="#7A5000" opacity="0.35"/></g>
  <circle cx="48" cy="48" r="42" fill="url(#bg)" stroke="url(#ring)" stroke-width="5"/>
  <circle cx="48" cy="48" r="38" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.65"/>
  <path d="M 26 36 Q 48 22 70 36" fill="none" stroke="#fff" stroke-width="2.2" opacity="0.7" stroke-linecap="round"/>
  <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -1.2;0 0" dur="6.75s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <path d="M 22 60 C 21 58 19 58 19 60 C 19 62 22 64 22 64 C 22 64 25 62 25 60 C 25 58 23 58 22 60 Z" fill="#F5B5C5" opacity="0.85"><animate attributeName="opacity" values="0.85;0.6;0.85" dur="4.50s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></path>
    <path d="M 76 64 C 75 62 73 62 73 64 C 73 66 76 68 76 68 C 76 68 79 66 79 64 C 79 62 77 62 76 64 Z" fill="#F5B5C5" opacity="0.7"><animate attributeName="opacity" values="0.7;0.4;0.7" dur="5.40s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></path>
  </g>
  <!-- 8 sun rays (gentle pulse + slow rotate) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="0 48 48; 360 48 48" dur="90.00s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="scale" values="1 1; 1.04 1.04; 1 1" dur="4.50s" repeatCount="indefinite" additive="sum" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      <g fill="url(#ray)" stroke="#A87000" stroke-width="0.8" stroke-linejoin="round">
        <!-- top -->
        <path d="M 48 22 L 51 30 L 45 30 Z"/>
        <!-- bottom -->
        <path d="M 48 74 L 51 66 L 45 66 Z"/>
        <!-- left -->
        <path d="M 22 48 L 30 51 L 30 45 Z"/>
        <!-- right -->
        <path d="M 74 48 L 66 51 L 66 45 Z"/>
        <!-- diagonals -->
        <path d="M 30 30 L 36 32 L 32 36 Z"/>
        <path d="M 66 30 L 60 32 L 64 36 Z"/>
        <path d="M 30 66 L 36 64 L 32 60 Z"/>
        <path d="M 66 66 L 60 64 L 64 60 Z"/>
      </g>
    </g>
  </g>
  <!-- sun body (gentle bob + breathe) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -0.6;0 0" dur="5.25s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <g>
      <animateTransform attributeName="transform" type="scale" values="1 1; 1.04 1.04; 1 1" dur="3.90s" repeatCount="indefinite" additive="sum" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      <!-- soft halo -->
      <circle cx="48" cy="48" r="20" fill="#FFE066" opacity="0.35"/>
      <!-- main sun -->
      <circle cx="48" cy="48" r="17" fill="url(#sun)" stroke="#A87000" stroke-width="1.5"/>
      <!-- inner highlight -->
      <ellipse cx="42" cy="42" rx="5" ry="3" fill="#fff" opacity="0.55"/>
      <!-- cheeks -->
      <ellipse cx="40" cy="50" rx="3" ry="1.8" fill="#F9C4B0" opacity="0.95"/>
      <ellipse cx="56" cy="50" rx="3" ry="1.8" fill="#F9C4B0" opacity="0.95"/>
      <!-- closed happy eyes ︶ ︶ -->
      <path d="M 39 47 Q 41 45 43 47" fill="none" stroke="#7A5000" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 53 47 Q 55 45 57 47" fill="none" stroke="#7A5000" stroke-width="1.5" stroke-linecap="round"/>
      <!-- big smile -->
      <path d="M 43 53 Q 48 57 53 53" fill="none" stroke="#7A5000" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
  <path d="M 24 28 L 25 26 L 26 28 L 28 29 L 26 30 L 25 32 L 24 30 L 22 29 Z" fill="#fff" opacity="0.9"><animate attributeName="opacity" values="0.9;0.6;0.9" dur="3.60s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></path>
  <path d="M 70 72 L 71 70 L 72 72 L 74 73 L 72 74 L 71 76 L 70 74 L 68 73 Z" fill="#fff" opacity="0.85"><animate attributeName="opacity" values="0.85;0.55;0.85" dur="4.20s" repeatCount="indefinite" begin="0.8s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></path>
</svg>
