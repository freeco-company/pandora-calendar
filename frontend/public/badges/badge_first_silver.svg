  <circle cx="68" cy="50" r="1" fill="#FFF8F2"><animate attributeName="opacity" values="0.95;0.55;0.95" dur="4.20s" repeatCount="indefinite" begin="0.8s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></circle>
