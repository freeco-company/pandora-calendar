    <path d="M 22 30 C 21 28 19 28 19 30 C 19 32 22 34 22 34 C 22 34 25 32 25 30 C 25 28 23 28 22 30 Z" fill="#F5B5C5" opacity="0.85"><animate attributeName="opacity" values="0.85;0.6;0.85" dur="4.50s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></path>
    <path d="M 74 28 C 73 26 71 26 71 28 C 71 30 74 32 74 32 C 74 32 77 30 77 28 C 77 26 75 26 74 28 Z" fill="#F5B5C5" opacity="0.7"><animate attributeName="opacity" values="0.7;0.4;0.7" dur="5.40s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></path>
