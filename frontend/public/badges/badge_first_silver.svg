      <path d="M 48 38.5 C 46 36 43 36 43 39 C 43 41 48 44 48 44 C 48 44 53 41 53 39 C 53 36 50 36 48 38.5 Z" fill="url(#bow)" stroke="#A86075" stroke-width="0.9"/>
