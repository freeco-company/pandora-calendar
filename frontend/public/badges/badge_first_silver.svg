<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="ring" x1="0.2" y1="0.1" x2="0.8" y2="0.9"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="55%" stop-color="#D8E0EE"/><stop offset="100%" stop-color="#7A8AAB"/></linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.7"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="60%" stop-color="#F0EAFA"/><stop offset="100%" stop-color="#C8D4E8" stop-opacity="0.55"/></radialGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D4DCEE"/><stop offset="100%" stop-color="#7A8AAB"/></linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF8F2"/><stop offset="100%" stop-color="#F0E0D0"/></linearGradient>
    <linearGradient id="bow" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFC0D0"/><stop offset="100%" stop-color="#E08AA0"/></linearGradient>
  </defs>
  <ellipse cx="48" cy="92" rx="26" ry="2.5" fill="#5A6B89" opacity="0.18"/>
