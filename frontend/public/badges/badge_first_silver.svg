    <animateTransform attributeName="transform" type="translate" values="0 0;0 -1;0 0" dur="6.00s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <rect x="32" y="44" width="32" height="22" rx="4" fill="url(#box)" stroke="#A88974" stroke-width="1.4"/>
    <rect x="34" y="46" width="28" height="2" rx="1" fill="#fff" opacity="0.55"/>
    <rect x="46" y="44" width="4" height="22" fill="url(#bow)"/>
    <rect x="32" y="52" width="32" height="4" fill="url(#bow)"/>
