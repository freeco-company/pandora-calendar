name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      # ── PHP / Laravel backend ────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, pdo, pdo_sqlite, sqlite3, xml, bcmath, zip, gd, openssl
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-php83-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php83-

      - name: Install composer deps
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare backend env (sqlite file)
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/framework/{cache,sessions,views} storage/logs bootstrap/cache database
          touch database/database.sqlite
          # Force sqlite file driver (overrides any DB_* in .env.example)
          {
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=$(pwd)/database/database.sqlite"
          } >> .env

      - name: Migrate + seed (demo data)
        working-directory: backend
        run: php artisan migrate --force --seed

      # ── Node / Frontend ───────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-chromium-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pw-chromium-

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      # ── Run e2e (playwright.config.ts auto-starts both servers) ──
      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7
          if-no-files-found: ignore
